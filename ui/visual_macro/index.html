<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Visual Macro Editor</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://unpkg.com/blockly/blockly.min.js"></script>
  <script src="qrc:///qtwebchannel/qwebchannel.js"></script>

    <style>
      .roi-coord-inputs { display: flex; gap: 6px; align-items: center; margin-top: 4px; }
      .roi-coord-inputs label { font-size: 12px; display: flex; align-items: center; gap: 2px; color: #ccc; }
      .roi-coord-inputs input { width: 60px; font-size: 12px; padding: 2px 4px;
        background: #2a2a2a; color: #eee; border: 1px solid #555; border-radius: 3px; }
      .roi-coord-inputs input:focus { border-color: #4a9eff; outline: none; }
    </style>
  </head>
<body>
  <div class="app-shell">
    <header class="toolbar">
      <div class="toolbar-group">
        <label for="file-path-input">保存先</label>
        <input id="file-path-input" type="text" value="sample_macro.json" />

        <label for="recent-files-button">最近</label>
        <div class="recent-files-dropdown">
          <button id="recent-files-button" type="button">最近使ったファイル</button>
          <div id="recent-files-menu" class="recent-files-menu" hidden></div>
        </div>
      </div>

      <div class="toolbar-group toolbar-actions">
        <button id="new-button" type="button">新規</button>
        <button id="load-button" type="button">開く...</button>
        <button id="save-button" type="button">保存</button>
        <button id="save-as-button" type="button">名前を付けて保存...</button>
        <button id="run-button" type="button">実行</button>
        <button id="stop-button" type="button">停止</button>
      </div>
    </header>

    <main class="main-layout">
      <aside class="side-panel">
        <section class="panel-section">
          <h2>テンプレート</h2>
          <button id="refresh-templates-button" type="button">一覧更新</button>
          <select id="template-select" size="10"></select>
        </section>
        <section class="panel-section">
          <h2>テンプレートプレビュー</h2>
          <div id="template-preview-container">
            <div class="preview-placeholder" id="template-preview-placeholder">画像ブロックを選択するとプレビューが表示されます</div>
            <img id="template-preview-img" hidden />
          </div>
          <button id="roi-select-btn" type="button" disabled>ROI選択...</button>
        </section>

        <section class="panel-section">
          <h2>メタデータ</h2>

          <label for="meta-name-input">名前</label>
          <input id="meta-name-input" type="text" value="" />

          <label for="meta-description-input">説明</label>
          <textarea id="meta-description-input" spellcheck="false"></textarea>

          <label for="meta-tags-input">タグ（カンマ区切り）</label>
          <input id="meta-tags-input" type="text" value="" />
        </section>

        <section class="panel-section">
          <h2>実行用 JSON</h2>
          <textarea id="program-json-output" spellcheck="false"></textarea>
        </section>
      </aside>

      <section class="editor-panel">
        <div id="blockly-div"></div>
      </section>
    </main>

    <footer class="status-bar">
      <span id="status-text">準備完了</span>
    </footer>
  </div>

  <script type="module" src="blocks.js"></script>
  <script type="module" src="app.js"></script>

    <div id="roi-modal" class="modal-overlay" hidden>
      <div class="modal-content roi-modal-content">
        <div class="roi-header">
          <h2>ROI選択</h2>
          <span id="roi-info-text">画像を読み込んでください</span>
        </div>
        <div class="roi-toolbar">
          <button id="roi-capture-btn" type="button">📷 現在のキャプチャ</button>
          <button id="roi-load-file-btn" type="button">📁 画像ファイル...</button>
          <input id="roi-file-input" type="file" accept="image/*" hidden />
          <span id="roi-coords-display"></span>
              <div class="roi-coord-inputs" id="roi-coord-inputs">
                <label>X1:<input id="roi-input-x1" type="number" min="0" step="1" value="0"></label>
                <label>Y1:<input id="roi-input-y1" type="number" min="0" step="1" value="0"></label>
                <label>X2:<input id="roi-input-x2" type="number" min="0" step="1" value="0"></label>
                <label>Y2:<input id="roi-input-y2" type="number" min="0" step="1" value="0"></label>
              </div>
        </div>
        <div class="roi-canvas-wrapper" id="roi-canvas-wrapper">
          <canvas id="roi-canvas"></canvas>
        </div>
        <div class="roi-actions">
          <button id="roi-apply-btn" type="button" disabled>✅ 適用</button>
          <button id="roi-reset-btn" type="button">🔄 リセット</button>
          <button id="roi-cancel-btn" type="button">❌ キャンセル</button>
        </div>
      </div>
    </div>
    
  </body>
</html>
